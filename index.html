<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TallyCut Support</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0b0d10;
      --panel: #141820;
      --text: #f5f7fa;
      --muted: #b8c0cc;
      --accent: #41c7e8;
      --border: #2a303a;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 20px 72px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(34px, 7vw, 56px);
      line-height: 1.1;
    }

    p {
      color: var(--muted);
    }

    .links {
      display: grid;
      gap: 14px;
      margin-top: 28px;
    }

    a {
      display: block;
      padding: 18px 20px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
    }

    a span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-weight: 400;
    }
  </style>
</head>
<body>
  <main>
    <h1>TallyCut Support</h1>
    <p>Support and privacy information for TallyCut, an iPhone app for multi-camera synchronization and editing.</p>

    <div class="links">
      <a href="support.html">Support <span>Get help, report bugs, or request features.</span></a>
      <a href="privacy.html">Privacy Policy <span>Learn how TallyCut handles app data and permissions.</span></a>
    </div>
  </main>
</body>
</html>
